<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
<div id="container"  >
    <div id="content">
        <div id="img-cat"><img src="2-removebg-preview.png" alt=""></div>
        <div id="casio" class="bg-[#E5ADAD] w-[38%] flex justify-center rounded-[10px] "><div id="casio-outer" class="bg-[#D9D9D9] w-[60%] text-center">CASIO</div></div>
        <div id="display" ></div>
        <div id="ctrls">
          <button type="button" class="clr w-[25%] ">CLR</button>
            <div id="del-ac" >
                <button type="button" class="del">DEL</button>
                <button type="button" class="ac">AC</button>
            </div>
        </div>

        <div id="btn-box">
            <button type="button" class="">7</button>
            <button type="button" class="">8</button>
            <button type="button" class="">9</button>
            <button type="button" class="symbol">x</button>

            <button type="button" class="">4</button>
            <button type="button" class="">5</button>
            <button type="button" class="">6</button>
            <button type="button" class="symbol">/</button>

            <button type="button" class="">1</button>
            <button type="button" class="">2</button>
            <button type="button" class="">3</button>
            <button type="button" class="symbol">+</button>

            <button type="button" class="">0</button>
            <button type="button" class="symbol">%</button>
            <button type="button" class="symbol">.</button>
            <button type="button" class="symbol equal">=</button>

            <button type="button" class="symbol">x<sup>2</sup></button>
            <button type="button" class="symbol">√</button>
            <button type="button" class="symbol">-</button>
        </div>
    </div>
</div>

</body>
</html>
